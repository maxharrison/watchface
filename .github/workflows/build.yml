name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install pebble-tool
        run: uv tool install pebble-tool

      - name: Install Pebble SDK
        run: yes | pebble sdk install latest

      - name: Install npm dependencies
        run: npm install

      - name: Build
        run: pebble build

      - name: Install virtual display
        run: sudo apt-get install -y xvfb

      - name: Run on emulator and capture logs
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          pebble install --emulator emery &
          sleep 15
          pebble logs --emulator emery 2>&1 | tee emulator-logs.txt &
          LOGS_PID=$!
          sleep 20
          kill $LOGS_PID 2>/dev/null || true
          pebble kill --emulator emery 2>/dev/null || true
          cat emulator-logs.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: watchface
          path: build/*.pbw
